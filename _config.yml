# Hexo Conf:iguration
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# Site
title: 最大的麦穗
subtitle:
description:
author: Sheng Lu
language: zh-Hans
timezone:

# URL
## If your site is put in a subdirectory, set url as 'http://yoursite.com/child' and root as '/child/'
url: http://blog.medowo.me
root: /
permalink: :year/:month/:day/:title/
permalink_defaults:

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md # File name of new posts
default_layout: post
titlecase: false # Transform title into titlecase
external_link: true # Open external links in new tab
filename_case: 0
render_drafts: false
post_asset_folder: true
relative_link: false
future: true
highlight:
  enable: true
  line_number: true
  auto_detect: false
  tab_replace:

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Date / Time format
## Hexo uses Moment.js to parse and display date
## You can customize the date format as defined in
## http://momentjs.com/docs/#/displaying/format/
date_format: YYYY-MM-DD
time_format: HH:mm:ss

# Pagination
## Set per_page to 0 to disable pagination
per_page: 10
pagination_dir: page

# Extensions
## Plugins: https://hexo.io/plugins/
## Themes: https://hexo.io/themes/
theme: next

# Theme configuration
# Include any custom theme settings under this key to override theme defaults.
theme_config:
  # ---------------------------------------------------------------
  # Site Information Settings
  # See: https://theme-next.org/docs/getting-started/
  # ---------------------------------------------------------------

  footer:
    powered:
      # Hexo link (Powered by Hexo).
      enable: false


  # ---------------------------------------------------------------
  # Scheme Settings
  # ---------------------------------------------------------------

  # Schemes
  scheme: Gemini


  # ---------------------------------------------------------------
  # Sidebar Settings
  # See: https://theme-next.org/docs/theme-settings/sidebar
  # ---------------------------------------------------------------

  sidebar:
    # Sidebar Position.
    position: right

  # Sidebar Avatar
  avatar:
    # In theme directory (source/images): /images/avatar.gif
    # In site directory (source/uploads): /uploads/avatar.gif
    # You can also use other linking images.
    url: /images/avatar.jpg
    # If true, the avatar would be dispalyed in circle.
    rounded: true


  # ---------------------------------------------------------------
  # Misc Theme Settings
  # ---------------------------------------------------------------

  # `Follow me on GitHub` banner in the top-right corner.
  github_banner:
    enable: true
    permalink: https://github.com/vibyird
    title: Follow me on GitHub


  # ---------------------------------------------------------------
  # Comments Settings
  # See: https://theme-next.org/docs/third-party-services/comments
  # ---------------------------------------------------------------

  # Utteranc
  # Demo: https://utteranc.es/
  # For more information: http://trumandu.github.io/about/
  utteranc:
    enable: true
    repo: vibyird/vibyird.github.io
    pathname: og:title
    # theme: github-light,github-dark,github-dark-orange
    theme: github-light
    cdn: https://utteranc.es/client.js
    # If you want to modify priority, please config in **hexo**
    #priority:

# Category generator plugin
category_generator:
  per_page: 10

# Archive generator plugin
archive_generator:
  per_page: 10
  yearly: true
  monthly: true
  daily: false

# Tag generator plugin
tag_generator:
  per_page: 10

# Search generator plugin
search:
  path: search.xml
  field: post
  format: html
  limit: 10000

# Deployment
## Docs: https://hexo.io/docs/deployment.html
deploy:
- type: rsync
  host: medowo.net
  user: vibyird
  root: /var/www/blog.medowo.me
  delete: true
- type: git
  repo: git@github.com:vibyird/vibyird.github.io.git