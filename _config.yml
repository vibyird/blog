# Hexo Conf:iguration
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# Site
title: 最大的麦穗
subtitle:
description:
author: Sheng Lu
language: zh-Hans
timezone:

# URL
## If your site is put in a subdirectory, set url as 'http://yoursite.com/child' and root as '/child/'
url: http://blog.medowo.me
root: /
permalink: :year/:month/:day/:title/
permalink_defaults:

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md # File name of new posts
default_layout: post
titlecase: false # Transform title into titlecase
external_link: true # Open external links in new tab
filename_case: 0
render_drafts: false
post_asset_folder: true
relative_link: false
future: true
highlight:
  enable: true
  line_number: true
  auto_detect: false
  tab_replace:

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Date / Time format
## Hexo uses Moment.js to parse and display date
## You can customize the date format as defined in
## http://momentjs.com/docs/#/displaying/format/
date_format: YYYY-MM-DD
time_format: HH:mm:ss

# Pagination
## Set per_page to 0 to disable pagination
per_page: 10
pagination_dir: page

# Extensions
## Plugins: https://hexo.io/plugins/
## Themes: https://hexo.io/themes/
theme: next

#################################################################
###################### NexT Configuration #######################
#################################################################

theme_config:

  # ============================================================= #
  # ====================== Scheme Settings ====================== #
  # ============================================================= #
  scheme: Gemini

  # ============================================================= #
  # ===================== Sidebar Settings ====================== #
  # ============================================================= #

  sidebar:
    position: right
    display: post
    offset: 12
    onmobile: true

  avatar:
    url: /images/apple-touch-icon-next.png
    rounded: true
    rotated: false

  social:
    GitHub: https://github.com/vibyird || github
    E-Mail: mailto:vibyird@gmail.com/ || envelope
    Company: https://www.ccint.com/
    MicroBlog: https://www.ccint.com/

  social_icons:
    enable: true
    icons_only: true
    transition: true

  toc:
    enable: false
    number: true
    wrap: true

  # ============================================================= #
  # ======================== Tag Plugins ======================== #
  # ============================================================= #

  note:
    style: simple
    icons: true
    border_radius: 0
    light_bg_offset: -3

  tabs:
    enable: true
    transition:
      tabs: true
      labels: true
    border_radius: 0

  # Gitalk
  # Demo: https://gitalk.github.io
  gitalk:
    enable: true
    github_id: vibyird
    repo: vibyird.github.io
    client_id: 3ae96f659930c2c376d2
    client_secret: b3f36bb1b189bd2ef0def4da8040761bf200aa28
    admin_user: vibyird
    distraction_free_mode: true # Facebook-like distraction free mode
    # Gitalk's display language depends on user's browser or system environment
    # If you want everyone visiting your site to see a uniform language, you can set a force language value
    # Available value: en, es-ES, fr, ru, zh-CN, zh-TW
    language: zh-CN

# Category generator plugin
category_generator:
  per_page: 10

# Archive generator plugin
archive_generator:
  per_page: 10
  yearly: true
  monthly: true
  daily: false

# Tag generator plugin
tag_generator:
  per_page: 10

# Search generator plugin
search:
  path: search.xml
  field: post
  format: html
  limit: 10000

# Deployment
## Docs: https://hexo.io/docs/deployment.html
deploy:
- type: rsync
  host: medowo.net
  user: vibyird
  root: /var/www/blog.medowo.me
  delete: true
- type: git
  repo: git@github.com:vibyird/vibyird.github.io.git